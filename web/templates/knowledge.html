<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库管理 - 凯伦</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function() {
      const theme = localStorage.getItem("theme") || "system";
      if (theme === "system") {
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.setAttribute("data-theme", prefersLight ? "light" : "dark");
      } else {
        document.documentElement.setAttribute("data-theme", theme);
      }
    })();
  </script>
  <style>
    :root {
      --cfg-bg: #0a0a0f;
      --cfg-card: #16161f;
      --cfg-card-border: rgba(255,255,255,0.06);
      --cfg-text: #e8e8f0;
      --cfg-text2: #9ca3af;
      --cfg-text3: #6b7280;
      --cfg-accent: #00d4aa;
      --cfg-accent-h: #00b894;
      --cfg-ok: #22c55e;
      --cfg-warn: #f59e0b;
      --cfg-err: #ef4444;
      --cfg-radius: 14px;
      --cfg-radius-sm: 10px;
      --cfg-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    [data-theme="light"] {
      --cfg-bg: #f5f7fa;
      --cfg-card: #ffffff;
      --cfg-card-border: rgba(0,0,0,0.06);
      --cfg-text: #1f2937;
      --cfg-text2: #6b7280;
      --cfg-text3: #9ca3af;
      --cfg-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--cfg-bg);
      color: var(--cfg-text);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--cfg-card-border);
      padding: 0 20px;
    }

    [data-theme="light"] .top-bar {
      background: rgba(255,255,255,0.85);
    }

    .top-bar-inner {
      max-width: 860px;
      margin: 0 auto;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--cfg-text2);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: var(--cfg-radius-sm);
      transition: all 0.2s;
    }

    .top-bar-back:hover {
      background: var(--cfg-card);
      color: var(--cfg-text);
    }

    .top-bar-title {
      font-size: 1rem;
      font-weight: 600;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .cfg-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--cfg-text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--cfg-card);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      padding: 20px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--cfg-accent);
    }

    .stat-card .stat-label {
      font-size: 0.85rem;
      color: var(--cfg-text2);
      margin-top: 4px;
    }

    /* Upload Area */
    .upload-area {
      background: var(--cfg-card);
      border: 2px dashed var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--cfg-text3);
    }

    .upload-area:hover {
      border-color: var(--cfg-accent);
      color: var(--cfg-accent);
    }

    .upload-area.dragover {
      border-color: var(--cfg-accent);
      background: rgba(16,163,127,0.04);
    }

    .upload-area .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .upload-area .upload-text {
      font-size: 1rem;
      font-weight: 500;
    }

    .upload-area .upload-hint {
      font-size: 0.8rem;
      margin-top: 8px;
    }

    /* Document List */
    .doc-list {
      background: var(--cfg-card);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      overflow: hidden;
    }

    .doc-list-header {
      display: grid;
      grid-template-columns: 1fr 100px 120px;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(128,128,128,0.05);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--cfg-text3);
      border-bottom: 1px solid var(--cfg-card-border);
    }

    .doc-item {
      display: grid;
      grid-template-columns: 1fr 100px 120px;
      gap: 12px;
      padding: 14px 16px;
      align-items: center;
      border-bottom: 1px solid rgba(128,128,128,0.08);
      transition: background 0.15s;
    }

    .doc-item:last-child {
      border-bottom: none;
    }

    .doc-item:hover {
      background: rgba(16,163,127,0.03);
    }

    .doc-name {
      font-size: 0.9rem;
      color: var(--cfg-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doc-chunks {
      font-size: 0.85rem;
      color: var(--cfg-text2);
      text-align: center;
    }

    .doc-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .doc-btn {
      padding: 5px 12px;
      border: 1px solid var(--cfg-card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--cfg-text2);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .doc-btn:hover {
      border-color: var(--cfg-err);
      color: var(--cfg-err);
    }

    .doc-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--cfg-text3);
    }

    /* Bottom Actions */
    .bottom-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: var(--cfg-radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--cfg-accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--cfg-accent-h);
    }

    .btn-danger {
      background: transparent;
      color: var(--cfg-err);
      border: 1.5px solid var(--cfg-err);
    }

    .btn-danger:hover {
      background: rgba(239,68,68,0.08);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      padding: 12px 24px;
      border-radius: var(--cfg-radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      color: white;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      box-shadow: var(--cfg-shadow);
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.ok { background: var(--cfg-ok); }
    .toast.err { background: var(--cfg-err); }
    .toast.info { background: #3b82f6; }

    /* Progress */
    .upload-progress {
      margin-top: 16px;
      display: none;
    }

    .upload-progress.show {
      display: block;
    }

    .progress-bar {
      height: 4px;
      background: var(--cfg-card-border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--cfg-accent);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }

    .progress-text {
      font-size: 0.8rem;
      color: var(--cfg-text2);
      margin-top: 6px;
      text-align: center;
    }

    /* Backend Switch */
    .backend-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--cfg-text2);
    }

    .backend-tag {
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(16,163,127,0.1);
      color: var(--cfg-accent);
      font-size: 0.75rem;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .doc-list-header { display: none; }
      .doc-item {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .doc-chunks { text-align: left; }
      .bottom-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-inner">
      <a href="/" class="top-bar-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回聊天
      </a>
      <span class="top-bar-title">知识库管理</span>
      <div style="width: 80px;"></div>
    </div>
  </div>

  <main class="cfg-main">
    <!-- Stats -->
    <div class="section-title">
      <span>统计信息</span>
      <div class="backend-info">后端: <span class="backend-tag" id="backendTag">加载中...</span></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="docCount">0</div>
        <div class="stat-label">文档数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="chunkCount">0</div>
        <div class="stat-label">总块数</div>
      </div>
    </div>

    <!-- Upload -->
    <div class="section-title">上传文档</div>
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">&#128193;</div>
      <div class="upload-text">点击或拖拽文件到此处上传</div>
      <div class="upload-hint">支持 PDF、DOCX、TXT 格式</div>
      <input type="file" id="fileInput" style="display: none;" accept=".pdf,.docx,.doc,.txt">
      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">正在处理...</div>
      </div>
    </div>

    <!-- Document List -->
    <div class="section-title">
      <span>已上传文档</span>
      <span class="backend-info" id="docListCount"></span>
    </div>
    <div class="doc-list" id="docList">
      <div class="doc-list-header">
        <span>文件名</span>
        <span style="text-align:center">块数</span>
        <span></span>
      </div>
      <div class="doc-empty" id="docEmpty">暂无文档，请先上传</div>
    </div>

    <!-- Bottom Actions -->
    <div class="section-title">操作</div>
    <div class="bottom-actions">
      <button class="btn btn-danger" id="clearAllBtn">&#128465; 清空知识库</button>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const uploadArea = document.getElementById("uploadArea");
    const fileInput = document.getElementById("fileInput");
    const uploadProgress = document.getElementById("uploadProgress");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const docList = document.getElementById("docList");
    const docEmpty = document.getElementById("docEmpty");

    // Upload click
    uploadArea.addEventListener("click", (e) => {
      if (e.target.closest("#fileInput")) return;
      fileInput.click();
    });

    // Drag & drop
    uploadArea.addEventListener("dragover", (e) => {
      e.preventDefault();
      uploadArea.classList.add("dragover");
    });
    uploadArea.addEventListener("dragleave", () => {
      uploadArea.classList.remove("dragover");
    });
    uploadArea.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadArea.classList.remove("dragover");
      const files = e.dataTransfer.files;
      if (files.length > 0) uploadFile(files[0]);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) uploadFile(fileInput.files[0]);
    });

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append("file", file);

      uploadProgress.classList.add("show");
      progressFill.style.width = "30%";
      progressText.textContent = "正在解析文档...";

      try {
        const resp = await fetch("/api/rag/upload", {
          method: "POST",
          body: formData,
        });
        progressFill.style.width = "80%";
        const data = await resp.json();
        progressFill.style.width = "100%";

        if (data.success) {
          showToast(`已添加 ${data.chunks} 个文档块`);
          fileInput.value = "";
          setTimeout(() => {
            uploadProgress.classList.remove("show");
            progressFill.style.width = "0%";
          }, 1000);
          loadStats();
          loadDocuments();
        } else {
          showToast(data.message || "上传失败", true);
          uploadProgress.classList.remove("show");
        }
      } catch (e) {
        showToast("上传失败: " + e.message, true);
        uploadProgress.classList.remove("show");
      }
    }

    async function loadStats() {
      try {
        const resp = await fetch("/api/rag/stats");
        const data = await resp.json();
        if (data.success) {
          document.getElementById("chunkCount").textContent = data.total_chunks || 0;
          document.getElementById("backendTag").textContent = data.current_backend || "numpy";
        }
      } catch (e) {
        console.error("Failed to load stats:", e);
      }
    }

    async function loadDocuments() {
      try {
        const resp = await fetch("/api/rag/documents");
        const data = await resp.json();
        if (data.success) {
          const docs = data.documents || [];
          document.getElementById("docCount").textContent = docs.length;
          document.getElementById("docListCount").textContent = `共 ${docs.length} 个文档`;
          renderDocList(docs);
        }
      } catch (e) {
        console.error("Failed to load documents:", e);
      }
    }

    function renderDocList(docs) {
      // Remove existing items
      docList.querySelectorAll(".doc-item").forEach(el => el.remove());

      if (docs.length === 0) {
        docEmpty.style.display = "block";
        return;
      }
      docEmpty.style.display = "none";

      docs.forEach(doc => {
        const item = document.createElement("div");
        item.className = "doc-item";
        item.innerHTML = `
          <div class="doc-name" title="${escapeHtml(doc.source)}">${escapeHtml(doc.source)}</div>
          <div class="doc-chunks">${doc.chunks} 块</div>
          <div class="doc-actions">
            <button class="doc-btn" data-source="${escapeHtml(doc.source)}">删除</button>
          </div>
        `;
        item.querySelector(".doc-btn").addEventListener("click", () => deleteDocument(doc.source));
        docList.appendChild(item);
      });
    }

    async function deleteDocument(source) {
      if (!confirm(`确定要删除 "${source}" 吗？`)) return;
      try {
        const resp = await fetch(`/api/rag/documents/${encodeURIComponent(source)}`, {
          method: "DELETE",
        });
        const data = await resp.json();
        if (data.success) {
          showToast(data.message);
          loadStats();
          loadDocuments();
        } else {
          showToast(data.message || "删除失败", true);
        }
      } catch (e) {
        showToast("删除失败", true);
      }
    }

    document.getElementById("clearAllBtn").addEventListener("click", async () => {
      if (!confirm("确定要清空知识库吗？此操作不可恢复。")) return;
      try {
        const resp = await fetch("/api/rag/clear", { method: "POST" });
        const data = await resp.json();
        if (data.success) {
          showToast("知识库已清空");
          loadStats();
          loadDocuments();
        } else {
          showToast(data.message || "清空失败", true);
        }
      } catch (e) {
        showToast("清空失败", true);
      }
    });

    function showToast(message, isError = false) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast " + (isError ? "err" : "ok");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    loadStats();
    loadDocuments();
  </script>
</body>
</html>
