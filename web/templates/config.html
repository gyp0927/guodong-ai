<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型配置 - 凯伦</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    (function() {
      const theme = localStorage.getItem("theme") || "system";
      if (theme === "system") {
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        document.documentElement.setAttribute("data-theme", prefersLight ? "light" : "dark");
      } else {
        document.documentElement.setAttribute("data-theme", theme);
      }
    })();
  </script>
  <style>
    :root {
      --cfg-bg: var(--main-bg, #212121);
      --cfg-card: var(--input-bg, #2f2f2f);
      --cfg-card-border: var(--input-border, #4d4d4f);
      --cfg-text: var(--text-primary, #ececec);
      --cfg-text2: var(--text-secondary, #b4b4b4);
      --cfg-text3: var(--text-tertiary, #8e8e8e);
      --cfg-accent: var(--accent, #10a37f);
      --cfg-accent-h: var(--accent-hover, #0d8c6d);
      --cfg-ok: #22c55e;
      --cfg-warn: #f59e0b;
      --cfg-err: var(--error, #ef4444);
      --cfg-radius: 14px;
      --cfg-radius-sm: 10px;
      --cfg-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    [data-theme="light"] {
      --cfg-card: #ffffff;
      --cfg-card-border: #e5e5e5;
      --cfg-bg: #ffffff;
      --cfg-text: #1a1a1a;
      --cfg-text2: #666;
      --cfg-text3: #999;
      --cfg-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--cfg-bg);
      color: var(--cfg-text);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ===== Top Bar ===== */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(33,33,33,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--cfg-card-border);
      padding: 0 20px;
    }

    [data-theme="light"] .top-bar {
      background: rgba(255,255,255,0.85);
    }

    .top-bar-inner {
      max-width: 860px;
      margin: 0 auto;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--cfg-text2);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: var(--cfg-radius-sm);
      transition: all 0.2s;
    }

    .top-bar-back:hover {
      background: var(--cfg-card);
      color: var(--cfg-text);
    }

    .top-bar-title {
      font-size: 1rem;
      font-weight: 600;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ===== Main Layout ===== */
    .cfg-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ===== Section Title ===== */
    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--cfg-text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .section-title .count {
      font-size: 0.8rem;
      color: var(--cfg-text3);
      font-weight: 400;
    }

    /* ===== Config Card Grid ===== */
    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .config-card {
      background: var(--cfg-card);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      padding: 16px;
      position: relative;
      transition: all 0.2s;
      cursor: pointer;
    }

    .config-card:hover {
      border-color: var(--cfg-accent);
      transform: translateY(-1px);
      box-shadow: var(--cfg-shadow);
    }

    .config-card.active {
      border-color: var(--cfg-accent);
      background: rgba(16,163,127,0.04);
    }

    .config-card .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .config-card .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(16,163,127,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .config-card .card-info {
      flex: 1;
      min-width: 0;
    }

    .config-card .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--cfg-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .config-card .card-model {
      font-size: 0.8rem;
      color: var(--cfg-text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .config-card .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .config-card .card-badge.default {
      background: rgba(16,163,127,0.12);
      color: var(--cfg-accent);
    }

    .config-card .card-badge.testing {
      background: rgba(59,130,246,0.12);
      color: #3b82f6;
    }

    .config-card .card-badge.ok {
      background: rgba(34,197,94,0.12);
      color: var(--cfg-ok);
    }

    .config-card .card-badge.err {
      background: rgba(239,68,68,0.12);
      color: var(--cfg-err);
    }

    .config-card .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--cfg-card-border);
    }

    .config-card .card-btn {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--cfg-card-border);
      border-radius: 8px;
      background: transparent;
      color: var(--cfg-text2);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .config-card .card-btn:hover {
      border-color: var(--cfg-accent);
      color: var(--cfg-accent);
    }

    .config-card .card-btn.danger:hover {
      border-color: var(--cfg-err);
      color: var(--cfg-err);
    }

    .config-card .card-btn.primary {
      border-color: var(--cfg-accent);
      color: var(--cfg-accent);
    }

    .config-card .test-result {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      display: none;
      align-items: flex-start;
      gap: 6px;
      line-height: 1.4;
    }

    .config-card .test-result.show {
      display: flex;
    }

    .config-card .test-result.ok {
      background: rgba(34,197,94,0.08);
      color: var(--cfg-ok);
    }

    .config-card .test-result.err {
      background: rgba(239,68,68,0.08);
      color: var(--cfg-err);
    }

    /* ===== Empty State ===== */
    .config-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--cfg-text3);
    }

    .config-empty .icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* ===== Add Config Card ===== */
    .add-config-card {
      background: transparent;
      border: 2px dashed var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--cfg-text3);
      min-height: 140px;
    }

    .add-config-card:hover {
      border-color: var(--cfg-accent);
      color: var(--cfg-accent);
    }

    .add-config-card .icon {
      font-size: 2rem;
    }

    .add-config-card .text {
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ===== Form Card ===== */
    .form-card {
      background: var(--cfg-card);
      border: 1px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--cfg-shadow);
    }

    .form-card.hidden {
      display: none;
    }

    .form-card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-close {
      background: none;
      border: none;
      color: var(--cfg-text3);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .form-close:hover {
      color: var(--cfg-text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--cfg-text2);
      margin-bottom: 6px;
    }

    .cfg-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--cfg-bg);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius-sm);
      color: var(--cfg-text);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
    }

    .cfg-input:focus {
      border-color: var(--cfg-accent);
      box-shadow: 0 0 0 3px rgba(16,163,127,0.15);
    }

    .cfg-input::placeholder {
      color: var(--cfg-text3);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--cfg-text3);
      cursor: pointer;
      padding: 4px;
      font-size: 0.9rem;
    }

    .input-wrap .toggle-btn:hover {
      color: var(--cfg-text);
    }

    .input-hint {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--cfg-text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-hint.ok { color: var(--cfg-ok); }
    .input-hint.warn { color: var(--cfg-warn); }
    .input-hint.err { color: var(--cfg-err); }

    /* ===== Provider Tabs ===== */
    .provider-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      padding: 4px;
      background: rgba(128,128,128,0.08);
      border-radius: var(--cfg-radius-sm);
    }

    .provider-tab {
      flex: 1;
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: var(--cfg-text2);
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .provider-tab:hover {
      color: var(--cfg-text);
    }

    .provider-tab.active {
      background: var(--cfg-accent);
      color: white;
    }

    /* ===== Provider Grid ===== */
    .provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .provider-item {
      position: relative;
      background: transparent;
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius-sm);
      padding: 12px 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .provider-item:hover {
      border-color: var(--cfg-accent);
      background: rgba(16,163,127,0.04);
    }

    .provider-item.selected {
      border-color: var(--cfg-accent);
      background: rgba(16,163,127,0.08);
    }

    .provider-item .p-icon {
      font-size: 1.6rem;
      margin-bottom: 4px;
    }

    .provider-item .p-name {
      font-weight: 600;
      font-size: 0.8rem;
      line-height: 1.3;
    }

    .provider-item .p-tag {
      font-size: 0.65rem;
      color: var(--cfg-text3);
      margin-top: 2px;
    }

    .provider-item .check-mark {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      background: var(--cfg-accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
    }

    .provider-item.selected .check-mark {
      display: flex;
    }

    /* ===== Model Select ===== */
    .model-search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .model-search-row .cfg-input {
      flex: 1;
    }

    .model-list {
      max-height: 220px;
      overflow-y: auto;
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius-sm);
      background: var(--cfg-bg);
    }

    .model-list::-webkit-scrollbar {
      width: 6px;
    }

    .model-list::-webkit-scrollbar-thumb {
      background: var(--cfg-card-border);
      border-radius: 3px;
    }

    .model-group-title {
      padding: 8px 14px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--cfg-text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(128,128,128,0.05);
      position: sticky;
      top: 0;
    }

    .model-option {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(128,128,128,0.05);
    }

    .model-option:hover {
      background: rgba(16,163,127,0.06);
    }

    .model-option.selected {
      background: rgba(16,163,127,0.1);
      color: var(--cfg-accent);
      font-weight: 500;
    }

    .model-option .model-check {
      opacity: 0;
      font-size: 0.8rem;
    }

    .model-option.selected .model-check {
      opacity: 1;
    }

    .model-empty {
      padding: 20px;
      text-align: center;
      color: var(--cfg-text3);
      font-size: 0.85rem;
    }

    .custom-model-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--cfg-text2);
    }

    .custom-model-row input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--cfg-accent);
    }

    .custom-model-row label {
      cursor: pointer;
      user-select: none;
    }

    .model-count {
      text-align: right;
      font-size: 0.75rem;
      color: var(--cfg-text3);
      margin-top: 8px;
    }

    /* ===== Buttons ===== */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: var(--cfg-radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--cfg-accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--cfg-accent-h);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--cfg-text);
      border: 1.5px solid var(--cfg-card-border);
    }

    .btn-secondary:hover {
      border-color: var(--cfg-accent);
      color: var(--cfg-accent);
    }

    .btn-test {
      background: transparent;
      color: var(--cfg-accent);
      border: 1.5px solid var(--cfg-accent);
    }

    .btn-test:hover {
      background: rgba(16,163,127,0.08);
    }

    .btn-test:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      padding: 12px 24px;
      border-radius: var(--cfg-radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      color: white;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      box-shadow: var(--cfg-shadow);
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.ok { background: var(--cfg-ok); }
    .toast.err { background: var(--cfg-err); }
    .toast.info { background: #3b82f6; }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      .config-grid {
        grid-template-columns: 1fr;
      }
      .provider-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .top-bar-title {
        display: none;
      }
      .form-card {
        padding: 18px;
      }
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--cfg-card);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      padding: 20px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--cfg-accent);
    }

    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--cfg-text2);
      margin-top: 6px;
    }

    /* Daily Stats Table */
    .doc-list {
      background: var(--cfg-card);
      border: 1.5px solid var(--cfg-card-border);
      border-radius: var(--cfg-radius);
      overflow: hidden;
    }

    .doc-list-header {
      display: grid;
      grid-template-columns: 1fr 80px 80px 80px;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(128,128,128,0.05);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--cfg-text3);
      border-bottom: 1px solid var(--cfg-card-border);
    }

    .doc-item {
      display: grid;
      grid-template-columns: 1fr 80px 80px 80px;
      gap: 12px;
      padding: 12px 16px;
      align-items: center;
      border-bottom: 1px solid rgba(128,128,128,0.08);
      font-size: 0.85rem;
      color: var(--cfg-text);
    }

    .doc-item:last-child {
      border-bottom: none;
    }

    .doc-empty {
      text-align: center;
      padding: 30px 20px;
      color: var(--cfg-text3);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .doc-list-header { grid-template-columns: 1fr 60px 60px 60px; }
      .doc-item { grid-template-columns: 1fr 60px 60px 60px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-bar">
    <div class="top-bar-inner">
      <a href="/" class="top-bar-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回聊天
      </a>
      <span class="top-bar-title">模型配置</span>
      <div style="width: 80px;"></div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="cfg-main">
    <!-- Saved Configs -->
    <div class="section-title">
      <span>已保存的配置</span>
      <span class="count" id="configCount"></span>
    </div>
    <div class="config-grid" id="configGrid">
      <!-- Add Config Card -->
      <div class="add-config-card" id="addConfigCard">
        <div class="icon">+</div>
        <div class="text">新增配置</div>
      </div>
    </div>

    <!-- Config Form -->
    <div class="form-card hidden" id="configForm">
      <div class="form-card-title">
        <span id="formTitle">新增配置</span>
        <button class="form-close" id="formClose">&times;</button>
      </div>

      <div class="form-group">
        <label class="form-label">配置名称</label>
        <input type="text" class="cfg-input" id="configName" placeholder="例如：DeepSeek V3">
      </div>

      <div class="form-group">
        <label class="form-label">选择提供商</label>
        <div class="provider-tabs">
          <button class="provider-tab active" data-region="domestic">国内</button>
          <button class="provider-tab" data-region="international">国外</button>
          <button class="provider-tab" data-region="local">本地</button>
        </div>
        <div class="provider-grid" id="providerGrid"></div>
      </div>

      <div class="form-group">
        <label class="form-label">API 密钥</label>
        <div class="input-wrap">
          <input type="password" class="cfg-input" id="apiKeyInput" placeholder="输入 API Key">
          <button class="toggle-btn" id="toggleKey" title="显示/隐藏">&#128065;</button>
        </div>
        <div class="input-hint" id="keyHint">
          <span>&#128161;</span>
          <span id="keyHintText">Ollama 本地运行无需 API Key</span>
        </div>

    let selectedProvider = "ollama";
    let selectedModel = "";
    let editingConfigId = null;
    let testingConfigId = null;

    // ===== Load Saved Configs =====
    async function loadConfigs() {
      try {
        const resp = await fetch("/api/configs");
        const data = await resp.json();
        if (data.success) {
          savedConfigs = data.configs || [];
          activeConfigId = data.activeConfigId;
          renderConfigGrid();
        }
      } catch (e) {
        console.error("Failed to load configs:", e);
        showToast("加载配置失败", true);
      }
    }

    function renderConfigGrid() {
      const grid = document.getElementById("configGrid");
      const addCard = document.getElementById("addConfigCard");
      document.getElementById("configCount").textContent = `${savedConfigs.length} 个配置`;

      // Remove existing config cards
      grid.querySelectorAll(".config-card").forEach(el => el.remove());

      savedConfigs.forEach(cfg => {
        const isActive = cfg.id === activeConfigId;
        const p = PROVIDERS[cfg.provider] || {};
        const icon = PROVIDER_ICONS[cfg.provider] || "&#129302;";

        const card = document.createElement("div");
        card.className = `config-card ${isActive ? "active" : ""}`;
        card.dataset.id = cfg.id;
        card.innerHTML = `
          <div class="card-badge ${isActive ? "default" : ""}">${isActive ? "默认" : ""}</div>
          <div class="card-header">
            <div class="card-icon">${icon}</div>
            <div class="card-info">
              <div class="card-name">${escapeHtml(cfg.name)}</div>
              <div class="card-model">${escapeHtml(p.name || cfg.provider)} &#183; ${escapeHtml(cfg.model)}</div>
            </div>
          </div>
          <div class="card-actions">
            ${!isActive ? `<button class="card-btn primary" data-action="activate">&#9989; 设为默认</button>` : ""}
            <button class="card-btn" data-action="edit">&#9998; 编辑</button>
            <button class="card-btn" data-action="test">&#128260; 测试</button>
            <button class="card-btn danger" data-action="delete">&#128465; 删除</button>
          </div>
          <div class="test-result" id="testResult-${cfg.id}"></div>
        `;

        // Click on card to activate
        card.addEventListener("click", (e) => {
          if (e.target.closest(".card-btn") || e.target.closest(".test-result")) return;
          if (!isActive) activateConfig(cfg.id);
        });

        // Button handlers
        card.querySelectorAll(".card-btn").forEach(btn => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            if (action === "activate") activateConfig(cfg.id);
            else if (action === "edit") editConfig(cfg.id);
            else if (action === "test") testConfigCard(cfg.id);
            else if (action === "delete") deleteConfigCard(cfg.id);
          });
        });

        grid.insertBefore(card, addCard);
      });
    }

    // ===== Config Actions =====
    async function activateConfig(configId) {
      try {
        const resp = await fetch(`/api/configs/${configId}/activate`, { method: "POST" });
        const data = await resp.json();
        if (data.success) {
          activeConfigId = configId;
          renderConfigGrid();
          showToast("已设为默认配置");
        } else {
          showToast(data.message || "激活失败", true);
        }
      } catch (e) {
        showToast("激活失败", true);
      }
    }

    async function deleteConfigCard(configId) {
      if (!confirm("确定要删除这个配置吗？")) return;
      try {
        const resp = await fetch(`/api/configs/${configId}`, { method: "DELETE" });
        const data = await resp.json();
        if (data.success) {
          savedConfigs = savedConfigs.filter(c => c.id !== configId);
          if (activeConfigId === configId) activeConfigId = null;
          renderConfigGrid();
          showToast("配置已删除");
        } else {
          showToast(data.message || "删除失败", true);
        }
      } catch (e) {
        showToast("删除失败", true);
      }
    }

    async function testConfigCard(configId) {
      const cfg = savedConfigs.find(c => c.id === configId);
      if (!cfg) return;

      const resultEl = document.getElementById(`testResult-${configId}`);
      resultEl.className = "test-result show";
      resultEl.innerHTML = "&#9203; 正在测试连接...";

      try {
        const resp = await fetch("/api/configs/test", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ provider: cfg.provider, model: cfg.model, apiKey: cfg.apiKey })
        });
        const data = await resp.json();
        resultEl.className = `test-result show ${data.success ? "ok" : "err"}`;
        resultEl.innerHTML = `${data.success ? "&#9989;" : "&#10060;"} ${escapeHtml(data.message)}`;
      } catch (e) {
        resultEl.className = "test-result show err";
        resultEl.innerHTML = `&#10060; 测试失败: ${escapeHtml(e.message)}`;
      }
    }

    // ===== Edit Config =====
    function editConfig(configId) {
      const cfg = savedConfigs.find(c => c.id === configId);
      if (!cfg) return;

      editingConfigId = configId;
      document.getElementById("formTitle").textContent = "编辑配置";
      document.getElementById("configName").value = cfg.name;
      document.getElementById("apiKeyInput").value = cfg.apiKey || "";

      // Set provider
      selectedProvider = cfg.provider;
      const region = (PROVIDERS[cfg.provider] || {}).region || "domestic";
      document.querySelectorAll(".provider-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.region === region);
      });
      renderProviders(region);
      selectProvider(cfg.provider);

      // Set model
      selectedModel = cfg.model;
      renderModels(cfg.model);
      setTimeout(() => {
        document.querySelectorAll(".model-option").forEach(o => {
          o.classList.toggle("selected", o.dataset.value === cfg.model);
        });
      }, 0);

      showForm();
    }

    // ===== Form =====
    function showForm() {
      document.getElementById("configForm").classList.remove("hidden");
      document.getElementById("addConfigCard").style.display = "none";
      window.scrollTo({ top: document.getElementById("configForm").offsetTop - 70, behavior: "smooth" });
    }

    function hideForm() {
      document.getElementById("configForm").classList.add("hidden");
      document.getElementById("addConfigCard").style.display = "flex";
      editingConfigId = null;
      document.getElementById("formTitle").textContent = "新增配置";
      document.getElementById("configName").value = "";
      document.getElementById("apiKeyInput").value = "";
      document.getElementById("customModelCheck").checked = false;
      document.getElementById("customModelInput").style.display = "none";
      document.getElementById("customModelInput").value = "";
      document.getElementById("formTestResult").style.display = "none";
      document.getElementById("formTestResult").className = "input-hint";
      resetProviderSelection();
    }

    function resetProviderSelection() {
      selectedProvider = "ollama";
      selectedModel = "";
      document.querySelectorAll(".provider-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.region === "local");
      });
      renderProviders("local");
      selectProvider("ollama");
    }

    document.getElementById("addConfigCard").addEventListener("click", () => {
      editingConfigId = null;
      hideForm();
      showForm();
      resetProviderSelection();
    });

    document.getElementById("formClose").addEventListener("click", hideForm);

    // ===== Provider Selection =====
    function renderProviders(region) {
      const grid = document.getElementById("providerGrid");
      grid.innerHTML = "";
      Object.entries(PROVIDERS).forEach(([key, p]) => {
        if (p.region !== region) return;
        const el = document.createElement("div");
        el.className = "provider-item" + (key === selectedProvider ? " selected" : "");
        el.dataset.provider = key;
        el.innerHTML = `
          <div class="check-mark">&#10003;</div>
          <div class="p-icon">${PROVIDER_ICONS[key] || "&#129302;"}</div>
          <div class="p-name">${p.name}</div>
        `;
        el.addEventListener("click", () => selectProvider(key));
        grid.appendChild(el);
      });
    }

    document.querySelectorAll(".provider-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".provider-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        renderProviders(tab.dataset.region);
      });
    });

    function selectProvider(provider) {
      selectedProvider = provider;
      const p = PROVIDERS[provider];

      document.querySelectorAll(".provider-item").forEach(el => {
        el.classList.toggle("selected", el.dataset.provider === provider);
      });

      const hint = document.getElementById("keyHint");
      const hintText = document.getElementById("keyHintText");
      const ollamaHint = document.getElementById("ollamaHint");

      if (p.needApiKey) {
        document.getElementById("apiKeyInput").placeholder = "输入 API Key";
        hint.className = "input-hint";
        hintText.textContent = "需要有效的 API Key 才能使用";
        ollamaHint.style.display = "none";
      } else {
        document.getElementById("apiKeyInput").placeholder = "无需 API Key（可留空）";
        hint.className = "input-hint ok";
        hintText.textContent = "本地运行，无需 API Key";
        ollamaHint.style.display = provider === "ollama" ? "flex" : "none";
      }

      document.getElementById("customModelCheck").checked = false;
      document.getElementById("customModelInput").style.display = "none";
      document.getElementById("customModelInput").value = "";
      document.getElementById("modelSearch").disabled = false;
      document.getElementById("modelSearch").value = "";

      renderModels(p.defaultModel);
      selectedModel = p.defaultModel;
    }

    // ===== Model Rendering =====
    function renderModels(defaultModel, filterText = "") {
      const list = document.getElementById("modelList");
      const p = PROVIDERS[selectedProvider];
      const lowerFilter = filterText.toLowerCase().trim();

      let models = p.models;
      if (lowerFilter) {
        models = p.models.filter(m =>
          m.name.toLowerCase().includes(lowerFilter) ||
          m.id.toLowerCase().includes(lowerFilter)
        );
      }

      const latest = models.filter(m => m.category === "latest");
      const legacy = models.filter(m => m.category === "legacy");

      list.innerHTML = "";

      if (latest.length > 0) {
        const title = document.createElement("div");
        title.className = "model-group-title";
        title.textContent = `&#25512;&#33616; (${latest.length})`;
        list.appendChild(title);
        latest.forEach(m => list.appendChild(createModelOption(m, defaultModel)));
      }

      if (legacy.length > 0) {
        const title = document.createElement("div");
        title.className = "model-group-title";
        title.textContent = `&#20854;&#20182; (${legacy.length})`;
        list.appendChild(title);
        legacy.forEach(m => list.appendChild(createModelOption(m, defaultModel)));
      }

      if (models.length === 0) {
        list.innerHTML = `<div class="model-empty">&#27809;&#26377;&#25214;&#21040;&#21305;&#37197;&#30340;&#27169;&#22411;</div>`;
      }

      const total = p.models.length;
      document.getElementById("modelCount").textContent = lowerFilter
        ? `&#25214;&#21040; ${models.length} / ${total} &#20010;&#27169;&#22411;`
        : `&#20849; ${total} &#20010;&#27169;&#22411;`;
    }

    function createModelOption(model, defaultModel) {
      const el = document.createElement("div");
      el.className = "model-option" + (model.id === defaultModel ? " selected" : "");
      el.dataset.value = model.id;
      el.innerHTML = `<span>${model.name}</span><span class="model-check">&#10003;</span>`;
      el.addEventListener("click", () => {
        document.querySelectorAll(".model-option").forEach(o => o.classList.remove("selected"));
        el.classList.add("selected");
        selectedModel = model.id;
      });
      return el;
    }

    document.getElementById("modelSearch").addEventListener("input", (e) => {
      renderModels(selectedModel, e.target.value);
    });

    document.getElementById("customModelCheck").addEventListener("change", (e) => {
      const customInput = document.getElementById("customModelInput");
      const modelSearch = document.getElementById("modelSearch");
      if (e.target.checked) {
        customInput.style.display = "block";
        modelSearch.disabled = true;
        customInput.focus();
      } else {
        customInput.style.display = "none";
        modelSearch.disabled = false;
      }
    });

    document.getElementById("toggleKey").addEventListener("click", () => {
      const input = document.getElementById("apiKeyInput");
      input.type = input.type === "password" ? "text" : "password";
    });

    // ===== Test =====
    document.getElementById("testBtn").addEventListener("click", async () => {
      const resultEl = document.getElementById("formTestResult");
      const btn = document.getElementById("testBtn");
      btn.disabled = true;
      btn.textContent = "&#9203; 测试中...";

      const provider = selectedProvider;
      const useCustom = document.getElementById("customModelCheck").checked;
      const model = useCustom
        ? document.getElementById("customModelInput").value.trim()
        : (selectedModel || PROVIDERS[provider].defaultModel);
      const apiKey = document.getElementById("apiKeyInput").value.trim();

      resultEl.style.display = "flex";
      resultEl.textContent = "正在测试连接...";
      resultEl.className = "input-hint";

      try {
        const resp = await fetch("/api/configs/test", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ provider, model, apiKey })
        });
        const data = await resp.json();
        resultEl.className = `input-hint ${data.success ? "ok" : "err"}`;
        resultEl.innerHTML = `${data.success ? "&#9989;" : "&#10060;"} ${escapeHtml(data.message)}`;
      } catch (e) {
        resultEl.className = "input-hint err";
        resultEl.innerHTML = `&#10060; 测试失败: ${escapeHtml(e.message)}`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = "&#128260; 测试连接";
      }
    });

    // ===== Save =====
    document.getElementById("saveBtn").addEventListener("click", async () => {
      const name = document.getElementById("configName").value.trim();
      const provider = selectedProvider;
      const useCustom = document.getElementById("customModelCheck").checked;
      const model = useCustom
        ? document.getElementById("customModelInput").value.trim()
        : (selectedModel || PROVIDERS[provider].defaultModel);
      const apiKey = document.getElementById("apiKeyInput").value.trim();

      if (!name) {
        showToast("请填写配置名称", true);
        return;
      }

      if (PROVIDERS[provider].needApiKey && !apiKey) {
        showToast("请输入 API Key", true);
        return;
      }

      try {
        const payload = { name, provider, model, apiKey };
        if (editingConfigId) payload.id = editingConfigId;

        const resp = await fetch("/api/configs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (data.success) {
          showToast(editingConfigId ? "配置已更新" : "配置已保存");
          hideForm();
          loadConfigs();
        } else {
          showToast(data.message || "保存失败", true);
        }
      } catch (e) {
        showToast("保存失败", true);
      }
    });

    // ===== Utils =====
    function showToast(message, isError = false) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast " + (isError ? "err" : "ok");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ===== Router Config =====
    let routerEnabled = false;
    let routerTiers = {};
    let editingRouterTier = null;
    let routerSelectedProvider = "ollama";
    let routerSelectedModel = "";

    const TIER_NAMES = {
      light: { label: "轻量", desc: "简单问答、问候", icon: "&#127775;" },
      default: { label: "默认", desc: "一般问题", icon: "&#9889;" },
      powerful: { label: "强力", desc: "复杂推理、代码", icon: "&#128293;" },
    };

    async function loadRouterStatus() {
      try {
        const resp = await fetch("/api/router/status");
        const data = await resp.json();
        if (data.success) {
          routerEnabled = data.enabled;
          routerTiers = data.tiers || {};
          document.getElementById("routerToggle").checked = routerEnabled;
          document.getElementById("routerToggleText").textContent = routerEnabled ? "已启用" : "已禁用";
          renderRouterGrid();
        }
      } catch (e) {
        console.error("Failed to load router status:", e);
      }
    }

    function renderRouterGrid() {
      const grid = document.getElementById("routerGrid");
      grid.innerHTML = "";

      ["light", "default", "powerful"].forEach(tier => {
        const cfg = routerTiers[tier] || {};
        const info = TIER_NAMES[tier];
        const p = PROVIDERS[cfg.provider] || {};

        const card = document.createElement("div");
        card.className = "config-card";
        card.innerHTML = `
          <div class="card-header">
            <div class="card-icon">${info.icon}</div>
            <div class="card-info">
              <div class="card-name">${info.label}</div>
              <div class="card-model">${escapeHtml(p.name || cfg.provider || "未配置")} &#183; ${escapeHtml(cfg.model || "-")}</div>
            </div>
          </div>
          <div style="font-size: 0.8rem; color: var(--cfg-text3); margin-bottom: 8px;">${info.desc}</div>
          <div class="card-actions">
            <button class="card-btn primary" data-tier="${tier}">&#9998; 配置</button>
          </div>
        `;
        card.querySelector(".card-btn").addEventListener("click", () => openRouterForm(tier));
        grid.appendChild(card);
      });
    }

    function openRouterForm(tier) {
      editingRouterTier = tier;
      const cfg = routerTiers[tier] || {};
      document.getElementById("routerFormTitle").textContent = `配置 ${TIER_NAMES[tier].label} 档位`;
      document.getElementById("routerForm").classList.remove("hidden");
      document.getElementById("routerForm").scrollIntoView({ behavior: "smooth", block: "center" });

      routerSelectedProvider = cfg.provider || "ollama";
      routerSelectedModel = cfg.model || "";
      document.getElementById("routerApiKey").value = cfg.apiKey || "";

      renderRouterProviders();
      renderRouterModels(routerSelectedModel);
    }

    function hideRouterForm() {
      document.getElementById("routerForm").classList.add("hidden");
      editingRouterTier = null;
    }

    function renderRouterProviders() {
      const grid = document.getElementById("routerProviderGrid");
      grid.innerHTML = "";
      Object.entries(PROVIDERS).forEach(([key, p]) => {
        const item = document.createElement("div");
        item.className = "provider-item" + (key === routerSelectedProvider ? " selected" : "");
        item.innerHTML = `
          <div class="p-name">${p.name}</div>
          <div class="check-mark">&#10003;</div>
        `;
        item.addEventListener("click", () => {
          routerSelectedProvider = key;
          routerSelectedModel = "";
          renderRouterProviders();
          renderRouterModels(PROVIDERS[key].defaultModel);
        });
        grid.appendChild(item);
      });
    }

    function renderRouterModels(defaultModel, filter = "") {
      const list = document.getElementById("routerModelList");
      const count = document.getElementById("routerModelCount");
      list.innerHTML = "";

      const provider = PROVIDERS[routerSelectedProvider];
      if (!provider) return;

      const models = provider.models.filter(m => !filter || m.name.toLowerCase().includes(filter.toLowerCase()) || m.id.toLowerCase().includes(filter.toLowerCase()));

      models.forEach(m => {
        const el = document.createElement("div");
        el.className = "model-option" + (m.id === defaultModel ? " selected" : "");
        el.dataset.value = m.id;
        el.innerHTML = `<span>${m.name}</span><span class="model-check">&#10003;</span>`;
        el.addEventListener("click", () => {
          document.querySelectorAll("#routerModelList .model-option").forEach(o => o.classList.remove("selected"));
          el.classList.add("selected");
          routerSelectedModel = m.id;
        });
        list.appendChild(el);
      });

      count.textContent = `${models.length} 个模型`;
      if (!routerSelectedModel && models.length > 0) routerSelectedModel = models[0].id;
    }

    document.getElementById("routerFormClose").addEventListener("click", hideRouterForm);
    document.getElementById("routerCancelBtn").addEventListener("click", hideRouterForm);

    document.getElementById("routerToggleKey").addEventListener("click", () => {
      const input = document.getElementById("routerApiKey");
      input.type = input.type === "password" ? "text" : "password";
    });

    document.getElementById("routerModelSearch").addEventListener("input", (e) => {
      renderRouterModels(routerSelectedModel, e.target.value);
    });

    document.getElementById("routerCustomModelCheck").addEventListener("change", (e) => {
      const customInput = document.getElementById("routerCustomModelInput");
      const modelSearch = document.getElementById("routerModelSearch");
      if (e.target.checked) {
        customInput.style.display = "block";
        modelSearch.disabled = true;
        customInput.focus();
      } else {
        customInput.style.display = "none";
        modelSearch.disabled = false;
      }
    });

    document.getElementById("routerToggle").addEventListener("change", async (e) => {
      try {
        const resp = await fetch("/api/router/config", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: e.target.checked }),
        });
        const data = await resp.json();
        if (data.success) {
          routerEnabled = e.target.checked;
          document.getElementById("routerToggleText").textContent = routerEnabled ? "已启用" : "已禁用";
          showToast(data.message);
        } else {
          showToast(data.message || "操作失败", true);
          e.target.checked = !e.target.checked;
        }
      } catch (err) {
        showToast("操作失败", true);
        e.target.checked = !e.target.checked;
      }
    });

    document.getElementById("routerSaveBtn").addEventListener("click", async () => {
      if (!editingRouterTier) return;

      const useCustom = document.getElementById("routerCustomModelCheck").checked;
      const model = useCustom
        ? document.getElementById("routerCustomModelInput").value.trim()
        : routerSelectedModel;
      const apiKey = document.getElementById("routerApiKey").value.trim();

      if (!model) {
        showToast("请选择或输入模型名称", true);
        return;
      }

      const provider = PROVIDERS[routerSelectedProvider];
      const payload = {
        provider: routerSelectedProvider,
        model: model,
        apiKey: apiKey,
        baseUrl: provider ? provider.base_url : "",
      };

      try {
        const resp = await fetch(`/api/router/tiers/${editingRouterTier}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (data.success) {
          showToast(data.message);
          hideRouterForm();
          loadRouterStatus();
        } else {
          showToast(data.message || "保存失败", true);
        }
      } catch (e) {
        showToast("保存失败", true);
      }
    });

    // ===== Stats =====
    async function loadStats() {
      const days = parseInt(document.getElementById("statsPeriod").value, 10) || 7;
      try {
        const resp = await fetch(`/api/stats?days=${days}`);
        const data = await resp.json();
        if (data.success) {
          const s = data.summary;
          document.getElementById("statCalls").textContent = (s.call_count || 0).toLocaleString();
          document.getElementById("statTokens").textContent = (s.total_tokens || 0).toLocaleString();
          document.getElementById("statCost").textContent = "$" + (s.total_cost_usd || 0).toFixed(4);
          document.getElementById("statDuration").textContent = Math.round(s.avg_duration_ms || 0) + "ms";
          document.getElementById("statRate").textContent = `成功率: ${s.success_rate || 0}% (${s.period_days || days}天)`;
          renderDailyStats(data.daily || []);
        }
      } catch (e) {
        console.error("Failed to load stats:", e);
      }
    }

    function renderDailyStats(daily) {
      const list = document.getElementById("dailyStatsList");
      const empty = document.getElementById("dailyStatsEmpty");
      list.querySelectorAll(".doc-item").forEach(el => el.remove());

      if (daily.length === 0) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      daily.forEach(d => {
        const item = document.createElement("div");
        item.className = "doc-item";
        item.innerHTML = `
          <span>${d.day || "-"}</span>
          <span style="text-align:center">${d.calls || 0}</span>
          <span style="text-align:center">${(d.tokens || 0).toLocaleString()}</span>
          <span style="text-align:right">$${(d.cost || 0).toFixed(4)}</span>
        `;
        list.appendChild(item);
      });
    }

    document.getElementById("statsPeriod").addEventListener("change", loadStats);

    // ===== Init =====
    renderProviders("local");
    selectProvider("ollama");
    loadConfigs();
    loadRouterStatus();
    loadStats();
  </script>
</body>
</html>
